# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Dev/utility scripts (OAuth smoke tests, build helpers) — not
    # production code, free to use print() etc.
    - scripts/**

linter:
  # Rules beyond `package:flutter_lints/flutter.yaml`. Suppress on a
  # single line with `// ignore: name_of_lint` when a rule genuinely
  # shouldn't apply.
  rules:
    # Catch real bugs that the default set misses. Kept deliberately
    # narrow: noisy stylistic rules (unawaited_futures, prefer_single_quotes,
    # require_trailing_commas) would require a cleanup sweep and don't
    # earn their keep before the hackathon deadline.
    cancel_subscriptions: true        # StreamSubscription leaks
    close_sinks: true                 # StreamController leaks
    no_adjacent_strings_in_list: true # Missing commas silently concatenate
    avoid_empty_else: true
    avoid_relative_lib_imports: true
    unnecessary_null_checks: true
    unnecessary_await_in_return: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
